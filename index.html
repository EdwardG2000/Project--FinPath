<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>FinPath – Sign In</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="api.js"></script>
</head>
<body style="display:flex;align-items:center;justify-content:center;min-height:100vh;">

  <div class="card" style="width:100%;max-width:400px;padding:2.5rem;">
    <div style="font-size:1.5rem;font-weight:800;margin-bottom:.25rem;">
      Fin<span style="color:var(--green)">Path</span>
    </div>
    <p style="color:var(--muted);font-size:.85rem;margin-bottom:2rem;">
      Sign in to continue learning
    </p>

    <!-- Demo hint -->
    <div style="background:#e6f9f1;border:1px solid #a8f0d0;border-radius:10px;
                padding:.75rem 1rem;font-size:.8rem;color:var(--green-d);margin-bottom:1.5rem;">
      <strong>Demo:</strong> demo@creditwise.co.uk / demo1234
    </div>

    <div id="error-msg" style="display:none;color:#d9534f;font-size:.85rem;
         margin-bottom:1rem;background:#fff0f0;padding:.75rem;border-radius:8px;"></div>

    <div style="margin-bottom:1rem;">
      <label style="font-size:.82rem;font-weight:700;display:block;margin-bottom:.4rem;">
        Email
      </label>
      <input id="email" type="email" placeholder="you@example.com"
        style="width:100%;padding:.7rem 1rem;border:1.5px solid var(--border);
               border-radius:10px;font-size:.9rem;outline:none;font-family:inherit;" />
    </div>

    <div style="margin-bottom:1.5rem;">
      <label style="font-size:.82rem;font-weight:700;display:block;margin-bottom:.4rem;">
        Password
      </label>
      <input id="password" type="password" placeholder="••••••••"
        style="width:100%;padding:.7rem 1rem;border:1.5px solid var(--border);
               border-radius:10px;font-size:.9rem;outline:none;font-family:inherit;" />
    </div>

    <button class="btn btn-primary" style="width:100%;" onclick="handleLogin()">
      Sign in →
    </button>

    <p style="text-align:center;font-size:.82rem;color:var(--muted);margin-top:1.25rem;">
      No account? 
      <a href="register.html" style="color:var(--green);font-weight:700;">Get started free</a>
    </p>
  </div>

<script>
  // If already logged in, skip to dashboard
  if (isLoggedIn()) window.location.href = 'dashboard.html';

  async function handleLogin() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const errEl = document.getElementById('error-msg');
    errEl.style.display = 'none';

    try {
      await login(email, password);
      window.location.href = 'dashboard.html';
    } catch (err) {
      errEl.textContent = err.detail || 'Invalid email or password';
      errEl.style.display = 'block';
    }
  }

  // Allow pressing Enter to submit
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') handleLogin();
  });
</script>
</body>
</html>
